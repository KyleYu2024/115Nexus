<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="115Nexus">
    <meta name="theme-color" content="#030617">
    <meta name="color-scheme" content="dark">
    <title>115Nexus</title>
    <link rel="manifest" href="/manifest.json?v={{.Version}}">
    <link rel="icon" href="https://img.andp.cc/icons/upload/115Nexus.png">
    <link rel="apple-touch-icon" href="https://img.andp.cc/icons/upload/115Nexus.png">
    <link rel="stylesheet" href="/static/style.css?v={{.Version}}">
</head>
<body>
    <div id="loginModal" class="modal-overlay" style="display:none;"><div class="modal" style="max-width:400px; padding:30px;">
        <div style="text-align:center; font-size:20px; font-weight:bold; margin-bottom:20px;">身份验证</div>
        <input class="form-control" id="l_user" placeholder="用户名" style="margin-bottom:12px;">
        <input type="password" class="form-control" id="l_pass" placeholder="密码" style="margin-bottom:20px;">
        <button class="btn" style="height:46px; width:100%;" onclick="doLogin()">登 录</button>
        <div id="loginMsg" style="color:#fa5252; text-align:center; font-size:12px; margin-top:12px; min-height:15px;"></div>
    </div></div>

    <div class="navbar">
        <div class="brand" onclick="location.reload()">{{.Logo}} 115Nexus</div>
        <div class="nav-links">
            <div class="nav-active-pill" id="navPill"></div>
            <div class="nav-item active" onclick="switchTab('search')">搜索</div>
            <div class="nav-item" onclick="switchTab('logs')">日志</div>
            <div class="nav-item" onclick="switchTab('settings')">设置</div>
        </div>
    </div>

    <div class="container">
        <div id="tab-search" class="tab-content active">
            <div class="search-box">
                <select id="searchSource"><option value="tmdb">HDHive</option><option value="pansou">Pansou</option></select>
                <input type="text" id="searchInput" placeholder="搜索片名 / 粘贴115分享链接或磁力链" onkeypress="if(event.keyCode==13) doSearch()">
                <button class="btn" onclick="doSearch()">🔍</button>
            </div>
            <div id="resultArea" class="list-group"></div>
            <div id="searchStatus" style="text-align:center; color:var(--text-sub); margin-top:50px;"></div>
        </div>

        <div id="tab-logs" class="tab-content">
            <div class="log-box" id="logContent"></div>
            <div style="margin-top:10px; text-align:right;">
                <button class="btn btn-sm" onclick="fetchLogs()">刷新日志</button>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="form-card">
                <div class="section-title">📦 HDHive <button class="btn btn-sm" style="margin-left:auto; background:var(--primary); font-size:11px;" onclick="doManualCheckin(this)">立即签到</button></div>
                <div class="form-group"><label>API Key</label><input class="form-control" id="hdhive_api_key"></div>
                <div style="display:flex; gap:10px; margin-bottom:15px;"><div style="flex:1;"><label>网页账号</label><input class="form-control" id="hdhive_user"></div><div style="flex:1;"><label>网页密码</label><input type="password" class="form-control" id="hdhive_pass"></div></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <div><label>自动签到</label><select class="form-control" id="hdhive_checkin_enabled"><option value="true">开启</option><option value="false">关闭</option></select></div>
                    <div><label>Cron 表达式</label><input class="form-control" id="hdhive_checkin_cron" placeholder="0 9 * * *"></div>
                    <div><label>赌狗模式</label><select class="form-control" id="hdhive_gambler_mode"><option value="true">开启</option><option value="false">关闭</option></select></div>
                </div>
            </div>

            <div class="form-card">
                <div class="section-title">🔍 Pansou</div>
                <div class="form-group"><label>Pansou URL</label><input class="form-control" id="pansou_url"></div>
                <div style="display:flex; gap:10px;"><div style="flex:1;"><label>Pansou用户</label><input class="form-control" id="pansou_username"></div><div style="flex:1;"><label>Pansou密码</label><input type="password" class="form-control" id="pansou_password"></div></div>
            </div>

            <div class="form-card">
                <div class="section-title">🔄 Media302</div>
                <div class="form-group"><label>地址</label><input class="form-control" id="media302_base_url"></div>
                <div class="form-group"><label>Token</label><input class="form-control" id="media302_token"></div>
                <div style="display:flex; gap:10px;"><div style="flex:1;"><label>转存目录</label><input class="form-control" id="media302_folder"></div><div style="flex:1;"><label>磁力目录</label><input class="form-control" id="magnet_folder"></div></div>
            </div>

            <div class="form-card">
                <div class="section-title">🎞️ 视频过滤</div>
                <div class="form-group"><label>排除关键词 (正则)</label><textarea class="form-control" id="exclude_words" style="height:100px;"></textarea></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>🎥 Min (MB)</label><input type="number" class="form-control" id="movie_min_size"></div>
                    <div><label>🎥 Max (MB)</label><input type="number" class="form-control" id="movie_max_size"></div>
                    <div><label>📺 Min (MB)</label><input type="number" class="form-control" id="tv_min_size"></div>
                    <div><label>📺 Max (MB)</label><input type="number" class="form-control" id="tv_max_size"></div>
                </div>
            </div>

            <div class="form-card">
                <div class="section-title">⚙️ 基础设置</div>
                <div class="form-group"><label>TMDB API 密钥</label><input class="form-control" id="tmdb_api_key"></div>
                <div class="form-group"><label>TG Bot Token</label><input class="form-control" id="tg_token"></div>
                <div class="form-group"><label>Webhook 通知</label><input class="form-control" id="webhook_url"></div>
                <div class="form-group"><label>代理地址</label><input class="form-control" id="proxy_url" placeholder="http://127.0.0.1:7890"></div>
                <button class="btn" style="width:100%; height:46px; margin-top:20px;" onclick="saveConfig()">保存全部配置</button>
            </div>
            <div style="text-align:center; color:var(--text-sub); font-size:12px; margin-bottom:30px;">Version {{.Version}}</div>
        </div>
    </div>

    <div class="modal-overlay" id="resModal"><div class="modal"><div class="modal-header"><span id="resTitle"></span><span onclick="closeModal()" style="font-size:24px; cursor:pointer;">×</span></div><div id="movieDetail" class="movie-detail" style="display:none;"></div><div class="modal-body" id="resList"></div></div></div>
    <div class="toast" id="toast"></div>

    <script src="/static/app.js?v={{.Version}}"></script>
</body>
</html>
